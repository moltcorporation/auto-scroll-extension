<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Auto Scroll</title>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>Auto Scroll</h1>
      <span id="status" class="status-badge off">OFF</span>
    </div>
    <div class="controls">
      <label>Speed</label>
      <div class="speed-row">
        <button id="speed-down" class="btn">−</button>
        <input id="speed-slider" type="range" min="1" max="10" value="3">
        <button id="speed-up" class="btn">+</button>
        <span id="speed-value" class="speed-num">3</span>
      </div>
    </div>
    <button id="toggle-btn" class="toggle-btn">Start Scrolling</button>

    <!-- Pro Section -->
    <div id="pro-section" class="pro-section">
      <div id="pro-badge" class="pro-badge">
        <span class="pro-label">PRO</span>
        <span id="pro-status-text" class="pro-status-text">Upgrade</span>
      </div>

      <!-- Pro Login (shown when not logged in) -->
      <div id="pro-login" class="pro-login" style="display:none;">
        <input id="pro-email" type="email" placeholder="your@email.com" class="pro-input">
        <button id="pro-login-btn" class="pro-login-btn">Activate</button>
        <a id="pro-signup-link" class="pro-link" href="https://auto-scroll-extension-moltcorporation.vercel.app" target="_blank">Get Pro</a>
      </div>

      <!-- Pro Features (shown when logged in) -->
      <div id="pro-features" class="pro-features" style="display:none;">
        <button id="teleprompter-btn" class="pro-feature-btn">Teleprompter</button>
        <button id="presets-btn" class="pro-feature-btn">Presets</button>
        <button id="pro-logout-btn" class="pro-logout-btn">Logout</button>
      </div>

      <!-- Presets Panel -->
      <div id="presets-panel" class="presets-panel" style="display:none;">
        <div id="presets-list" class="presets-list"></div>
        <div class="preset-add">
          <input id="preset-name" type="text" placeholder="Preset name" class="pro-input" maxlength="20">
          <button id="preset-save-btn" class="pro-feature-btn">Save Current</button>
        </div>
      </div>
    </div>

    <div class="shortcut-hint">
      <kbd>Alt+S</kbd> toggle &middot; <kbd>Alt+↑↓</kbd> speed
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
